include: 
  - ../../../base/mimir/compose.yml

services:
  prometheus:
    labels:
      caddy: ${DOMAIN}
      caddy.reverse_proxy: "http://prometheus:9090"
      caddy.tls: /certs/${CERT_DOMAIN}/fullchain.pem /certs/${CERT_DOMAIN}/privkey.pem
    networks:
      - caddy
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./targets:/etc/prometheus/targets:ro
      - ./web.yml:/etc/prometheus/web.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.config.file=/etc/prometheus/web.yml'

networks:
  caddy:
    external: true